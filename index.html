<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Your Daily Habits</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0b1a;
    --surface: #1a1428;
    --accent1: #c084fc;
    --accent2: #f0abfc;
    --accent3: #86efac;
    --accent4: #fbbf24;
    --accent5: #fb923c;
    --text: #f1e8ff;
    --muted: #9d8cbf;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; padding-bottom: 40px; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 50% at 20% 10%, rgba(124,58,237,0.18) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 80% 80%, rgba(192,132,252,0.12) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  .container { max-width: 480px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
  header { padding: 48px 0 24px; text-align: center; }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; color: var(--accent1); text-transform: uppercase; margin-bottom: 8px; }
  h1 { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 300; line-height: 1.1; }
  h1 em { font-style: italic; color: var(--accent2); }
  .date-display { margin-top: 10px; font-size: 13px; color: var(--muted); font-weight: 300; }
  .rings-row { display: flex; justify-content: center; gap: 20px; padding: 28px 0 32px; flex-wrap: wrap; }
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
  .ring-svg { width: 72px; height: 72px; transform: rotate(-90deg); transition: transform 0.2s; }
  .ring-wrap:active .ring-svg { transform: rotate(-90deg) scale(0.93); }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 7; }
  .ring-fill { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1); }
  .ring-label { font-size: 10px; font-weight: 500; letter-spacing: 0.05em; color: var(--muted); text-align: center; max-width: 60px; line-height: 1.3; }
  .ring-emoji { font-size: 22px; position: absolute; }
  .ring-inner { position: relative; display: flex; align-items: center; justify-content: center; width: 72px; height: 72px; }
  .section-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; margin-bottom: 14px; }
  .habits-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
  .habit-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.2s; user-select: none; position: relative; overflow: hidden; }
  .habit-card::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; border-radius: 16px; }
  .habit-card.done { border-color: rgba(255,255,255,0.12); }
  .habit-card.done::before { opacity: 1; }
  .habit-card[data-id="workout"].done::before { background: linear-gradient(135deg, rgba(192,132,252,0.12), transparent); }
  .habit-card[data-id="tea"].done::before { background: linear-gradient(135deg, rgba(134,239,172,0.10), transparent); }
  .habit-card[data-id="walk"].done::before { background: linear-gradient(135deg, rgba(251,191,36,0.10), transparent); }
  .habit-card[data-id="inositol"].done::before { background: linear-gradient(135deg, rgba(251,146,60,0.10), transparent); }
  .habit-card:active { transform: scale(0.98); }
  .habit-icon { font-size: 26px; flex-shrink: 0; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: rgba(255,255,255,0.05); transition: all 0.3s; }
  .habit-card.done .habit-icon { background: rgba(255,255,255,0.1); transform: scale(1.05); }
  .habit-info { flex: 1; }
  .habit-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
  .habit-sub { font-size: 12px; color: var(--muted); font-weight: 300; }
  .habit-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); flex-shrink: 0; font-size: 13px; }
  .habit-card[data-id="workout"] .habit-check.checked { background: var(--accent1); border-color: var(--accent1); }
  .habit-card[data-id="tea"] .habit-check.checked { background: var(--accent3); border-color: var(--accent3); }
  .habit-card[data-id="walk"] .habit-check.checked { background: var(--accent4); border-color: var(--accent4); }
  .habit-card[data-id="inositol"] .habit-check.checked { background: var(--accent5); border-color: var(--accent5); }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 14px 12px; text-align: center; }
  .stat-num { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 300; color: var(--accent1); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .graph-section { margin-bottom: 32px; }
  .graph-bars { display: flex; align-items: flex-end; gap: 5px; height: 80px; padding: 0 2px; }
  .graph-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .graph-bar { width: 100%; border-radius: 4px 4px 0 0; background: linear-gradient(to top, var(--accent1), var(--accent2)); opacity: 0.7; min-height: 2px; }
  .graph-bar-label { font-size: 8px; color: var(--muted); text-align: center; }
  .calendar-section { margin-bottom: 32px; }
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .month-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 8px; }
  .month-name { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 400; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-label { text-align: center; font-size: 10px; color: var(--muted); padding-bottom: 6px; font-weight: 500; }
  .cal-day { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.03); }
  .cal-day.empty { background: transparent; }
  .cal-day.today { color: var(--text); border: 1px solid rgba(192,132,252,0.4); }
  .cal-day.future { opacity: 0.3; }
  .cal-day.c1 { background: rgba(192,132,252,0.15); color: var(--text); }
  .cal-day.c2 { background: rgba(192,132,252,0.28); color: var(--text); }
  .cal-day.c3 { background: rgba(192,132,252,0.45); color: var(--text); }
  .cal-day.c4 { background: rgba(192,132,252,0.7); color: #fff; box-shadow: 0 0 8px rgba(192,132,252,0.4); }
  .message-card { background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(192,132,252,0.1)); border: 1px solid rgba(192,132,252,0.2); border-radius: 16px; padding: 18px 20px; text-align: center; margin-bottom: 24px; }
  .message-text { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 300; font-style: italic; color: var(--accent2); line-height: 1.5; }
  .save-hint { text-align: center; font-size: 11px; color: var(--muted); opacity: 0.6; padding: 0 20px; }
  .confetti-piece { position: fixed; width: 8px; height: 8px; border-radius: 2px; pointer-events: none; z-index: 999; animation: confetti-fall 1s ease-in forwards; }
  @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(200px) rotate(720deg); opacity: 0; } }
  .pulse { animation: pulse-once 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pulse-once { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">PCOS Habit Tracker</div>
    <h1>Your <em>daily</em><br>foundations</h1>
    <div class="date-display" id="dateDisplay"></div>
  </header>
  <div class="rings-row" id="ringsRow"></div>
  <div class="section-title">Today</div>
  <div class="habits-grid" id="habitsGrid"></div>
  <div class="stats-row" id="statsRow"></div>
  <div class="graph-section">
    <div class="section-title">Last 14 days</div>
    <div class="graph-bars" id="graphBars"></div>
  </div>
  <div class="calendar-section">
    <div class="month-nav">
      <button class="month-btn" id="prevMonth">‹</button>
      <div class="month-name" id="monthName"></div>
      <button class="month-btn" id="nextMonth">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <div class="message-card"><div class="message-text" id="messageText"></div></div>
  <div class="save-hint">Your data saves automatically in this browser.<br>Bookmark or add to home screen to return anytime.</div>
</div>
<script>
const HABITS=[{id:'workout',name:'Strength Workout',sub:'15–20 min · 2× per week',emoji:'🏋️',color:'#c084fc'},{id:'tea',name:'Spearmint Tea',sub:'1–2 cups · daily',emoji:'🍵',color:'#86efac'},{id:'walk',name:'Post-meal Walk',sub:'10–15 min · after eating',emoji:'🚶‍♀️',color:'#fbbf24'},{id:'inositol',name:'Inositol Powder',sub:'In your drink · daily',emoji:'✨',color:'#fb923c'}];
const DAYS=['S','M','T','W','T','F','S'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MESSAGES=["Every small habit is a vote for the version of yourself you're becoming.","You don't have to be perfect. You just have to show up.","Your body is working with you, not against you.","Three months from now you'll thank today's version of you.","Consistency over intensity. Always.","Even one habit done today is better than zero.","You're building a protocol that actually works for your body.","Rest days count too. Recovery is part of the process."];
function getStorage(){try{return JSON.parse(localStorage.getItem('pcos_tracker')||'{}')}catch{return{}}}
function setStorage(d){try{localStorage.setItem('pcos_tracker',JSON.stringify(d))}catch{}}
function todayKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function dateKey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
let data=getStorage(),viewMonth=new Date().getMonth(),viewYear=new Date().getFullYear();
function getTodayHabits(){const k=todayKey();if(!data[k])data[k]={};return data[k]}
function toggleHabit(id){const k=todayKey();if(!data[k])data[k]={};data[k][id]=!data[k][id];setStorage(data);render();if(data[k][id])confettiBurst()}
function confettiBurst(){const colors=['#c084fc','#f0abfc','#86efac','#fbbf24','#fb923c'];for(let i=0;i<18;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText=`left:${30+Math.random()*40}vw;top:${20+Math.random()*40}vh;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.3}s;animation-duration:${0.7+Math.random()*0.5}s;`;document.body.appendChild(el);setTimeout(()=>el.remove(),1200)}}
function getCount(key){if(!data[key])return 0;return HABITS.filter(h=>data[key][h.id]).length}
function getStats(){const keys=Object.keys(data);let totalDays=0,perfectDays=0;keys.forEach(k=>{const c=getCount(k);if(c>0)totalDays++;if(c===HABITS.length)perfectDays++});return{totalDays,perfectDays}}
function getStreak(){let streak=0;const d=new Date();const todayDone=getCount(todayKey())>0;if(!todayDone)d.setDate(d.getDate()-1);for(let i=0;i<365;i++){const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;if(getCount(k)>0){streak++;d.setDate(d.getDate()-1)}else break}if(todayDone)streak++;return streak}
function renderRings(){const today=getTodayHabits();const container=document.getElementById('ringsRow');container.innerHTML='';const circ=2*Math.PI*28;HABITS.forEach(h=>{const done=!!today[h.id];const offset=done?0:circ;const wrap=document.createElement('div');wrap.className='ring-wrap';wrap.onclick=()=>toggleHabit(h.id);wrap.innerHTML=`<div class="ring-inner"><svg class="ring-svg" viewBox="0 0 64 64"><circle class="ring-bg" cx="32" cy="32" r="28"/><circle class="ring-fill" cx="32" cy="32" r="28" stroke="${h.color}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="filter:drop-shadow(0 0 4px ${h.color}88)"/></svg><span class="ring-emoji">${h.emoji}</span></div><div class="ring-label">${h.name.split(' ')[0]}</div>`;container.appendChild(wrap)})}
function renderHabits(){const today=getTodayHabits();const container=document.getElementById('habitsGrid');container.innerHTML='';HABITS.forEach(h=>{const done=!!today[h.id];const card=document.createElement('div');card.className=`habit-card ${done?'done':''}`;card.dataset.id=h.id;card.innerHTML=`<div class="habit-icon">${h.emoji}</div><div class="habit-info"><div class="habit-name">${h.name}</div><div class="habit-sub">${h.sub}</div></div><div class="habit-check ${done?'checked':''}">${done?'✓':''}</div>`;card.onclick=()=>{card.classList.add('pulse');setTimeout(()=>card.classList.remove('pulse'),400);toggleHabit(h.id)};container.appendChild(card)})}
function renderStats(){const{totalDays,perfectDays}=getStats();const streak=getStreak();document.getElementById('statsRow').innerHTML=`<div class="stat-card"><div class="stat-num">${streak}</div><div class="stat-label">Day streak</div></div><div class="stat-card"><div class="stat-num">${totalDays}</div><div class="stat-label">Days active</div></div><div class="stat-card"><div class="stat-num">${perfectDays}</div><div class="stat-label">Perfect days</div></div>`}
function renderGraph(){const container=document.getElementById('graphBars');container.innerHTML='';const today=new Date();for(let i=13;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const count=getCount(key);const pct=(count/HABITS.length)*100;const wrap=document.createElement('div');wrap.className='graph-bar-wrap';wrap.innerHTML=`<div class="graph-bar" style="height:${Math.max(pct,count>0?8:2)}%"></div><div class="graph-bar-label">${DAYS[d.getDay()]}</div>`;container.appendChild(wrap)}}
function renderCalendar(){document.getElementById('monthName').textContent=`${MONTHS[viewMonth]} ${viewYear}`;const grid=document.getElementById('calGrid');grid.innerHTML='';DAYS.forEach(d=>{const l=document.createElement('div');l.className='cal-day-label';l.textContent=d;grid.appendChild(l)});const today=new Date();const firstDay=new Date(viewYear,viewMonth,1).getDay();const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e)}for(let d=1;d<=daysInMonth;d++){const key=dateKey(viewYear,viewMonth,d);const count=getCount(key);const isToday=d===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear();const isFuture=new Date(viewYear,viewMonth,d)>today;const cell=document.createElement('div');let cls='cal-day';if(isFuture)cls+=' future';else if(count===1)cls+=' c1';else if(count===2)cls+=' c2';else if(count===3)cls+=' c3';else if(count>=4)cls+=' c4';if(isToday)cls+=' today';cell.className=cls;cell.textContent=d;grid.appendChild(cell)}}
function renderMessage(){const day=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/86400000);document.getElementById('messageText').textContent=MESSAGES[day%MESSAGES.length]}
function renderDate(){document.getElementById('dateDisplay').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function render(){renderRings();renderHabits();renderStats();renderGraph();renderCalendar();renderMessage();renderDate()}
document.getElementById('prevMonth').onclick=()=>{viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--}renderCalendar()};
document.getElementById('nextMonth').onclick=()=>{viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++}renderCalendar()};
render();
</script>
</body>
</html>
